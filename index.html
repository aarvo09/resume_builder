<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/template-modern.css" id="template-style" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
  <script src="scripts/state.js" defer></script>
  <script src="scripts/preview.js" defer></script>
  <script src="scripts/form.js" defer></script>
  <script src="scripts/templates.js" defer></script>
  <script src="scripts/pdf.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>Resume Studio</h1>
      <p>Answer a few questions and download a polished resume PDF.</p>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <div class="panel-title-row">
          <h2>Resume Details</h2>
          <button id="reset-btn" type="button" class="ghost-btn">Reset</button>
        </div>

        <form id="resume-form" novalidate>
          <fieldset>
            <legend>Personal Information</legend>
            <label>Full Name<input type="text" name="fullName" required /></label>
            <label>Email<input type="email" name="email" required /></label>
            <label>Phone<input type="text" name="phone" required /></label>
            <label>Location<input type="text" name="location" /></label>
            <label>LinkedIn<input type="url" name="linkedin" placeholder="https://linkedin.com/in/username" /></label>
            <label>Portfolio/GitHub<input type="url" name="portfolio" placeholder="https://..." /></label>
          </fieldset>

          <fieldset>
            <legend>Professional Summary</legend>
            <label>Summary<textarea name="summary" rows="4" required></textarea></label>
          </fieldset>

          <fieldset>
            <legend>Education</legend>
            <div id="education-list" class="repeat-list"></div>
            <button id="add-education" type="button" class="secondary-btn">Add Education</button>
          </fieldset>

          <fieldset>
            <legend>Experience</legend>
            <div id="experience-list" class="repeat-list"></div>
            <button id="add-experience" type="button" class="secondary-btn">Add Experience</button>
          </fieldset>

          <fieldset>
            <legend>Projects</legend>
            <div id="project-list" class="repeat-list"></div>
            <button id="add-project" type="button" class="secondary-btn">Add Project</button>
          </fieldset>

          <fieldset>
            <legend>Skills</legend>
            <label>Skills (comma separated)<input type="text" name="skills" placeholder="JavaScript, Python, SQL, Git" /></label>
          </fieldset>
        </form>
      </section>

      <section class="panel preview-panel">
        <div class="panel-title-row">
          <h2>Preview</h2>
          <select id="template-selector" aria-label="Select Resume Template">
            <option value="modern">Modern</option>
            <option value="classic">Classic</option>
            <option value="minimal">Minimal</option>
          </select>
        </div>

        <div id="resume-preview" class="resume modern-template"></div>

        <div class="actions">
          <button id="download-pdf" type="button" class="primary-btn">Download PDF</button>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
